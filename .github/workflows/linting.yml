name: Linting de Scripts Bash

permissions:
  contents: read

on:
  push:                 # Feedback temprano al pushear
    branches:
        - dev
        - 'feat/**'     # Cubre cualquier rama que empiece con feat/
        - 'fix/**'      # Cubre cualquier rama que empiece con fix/
        - 'release/**'  # Cubre cualquier rama que empiece con release/
    paths:
        - '**.sh'       # Solo se activa si hay cambios en archivos .sh
  pull_request:         # Gatekeeper para el merge
    branches:
        - main
        - dev           # Validate PRs against dev branch as well
        - 'release/**'  # Validamos PRs que vayan a release/**

jobs:
  shellcheck:
    name: Runner ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Check for script changes
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: |
            **.sh

      - name: ShellCheck Execution
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: ludeeus/action-shellcheck@master
        with:
          # Escanea todas las carpetas del repo en busca de .sh
          scandir: './'
        env:
          # Opcional: Ignorar algunos errores específicos si fuera necesario
          SHELLCHECK_OPTS: -e SC1091 # Ignora errores de "source" de archivos externos

      - name: Skip ShellCheck
        if: steps.changed-files.outputs.any_changed == 'false'
        run: echo "No scripts changed, reporting success to satisfy status checks."
