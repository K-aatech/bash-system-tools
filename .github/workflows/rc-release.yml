name: RC Pre-release Automation

permissions:
  contents: read

on:
  push:
    tags:
      - 'v*-rc.*' # Se activa con v1.7.0-rc.1, v2.0.0-rc.5, etc.

jobs:
  create-pre-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para generar notas de cambio precisas

      - name: Create Pre-release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          name: "Release Candidate ${{ github.ref_name }}"
          body: |
            ## 🧪 *Testing Build*
            Esta es una ***Release Candidate***.
            Los cambios incluidos en esta versión están sujetos a validación final antes de su promoción a `main`.
