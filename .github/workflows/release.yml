name: Release Suite BST

on:
  push:
    tags:
      - 'v*' # Se dispara cuando subes un tag que empieza con 'v'

jobs:
  build_release:
    name: Create Automatic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necesario para crear la release y subir assets
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Trae todo el historial para generar el changelog

      - name: GitHub Release Creation
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true # <--- AQUÍ se genera el CHANGELOG automático
          files: |
            audit/sys-audit-check.sh
            lib/logging.sh
            # Aquí irás añadiendo los scripts terminados que quieras incluir en la release
