name: Auto Tagging and Release on PR Merge

on:
  pull_request:
    branches:
      - main
    types: [closed]

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read # Necesario para leer los labels con precisión
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Mapeo de labels a tipos de incremento:
          custom_release_rules: major:major,minor:minor,patch:patch,feat:minor,fix:patch
          default_bump: patch # Puedes cambiar esto basado en labels del PR
          # Si el mensaje del commit contiene #major, #minor o #patch
          # O si usas labels en el PR (opción recomendada)
          release_branches: main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          generate_release_notes: true
          # Marcamos como pre-release si el tag contiene -rc o -alpha
          prerelease: ${{ contains(steps.tag_version.outputs.new_tag, '-rc') || contains(steps.tag_version.outputs.new_tag, '-alpha') }}
          files: |
            audit/*.sh
            hardening/*.sh
            lib/*.sh
            maintenance/*.sh
            scripts/*.sh
            tests/*.sh
